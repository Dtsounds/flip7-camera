<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flip 7 Scorekeeper</title>
<style>
:root {
--bg: #1a1040;
--card: #2a1b5e;
--accent: #ff5e7e;
--gold: #ffd23f;
--green: #3ddc84;
--blue: #4cc9f0;
--purple: #b388ff;
--text: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
background: linear-gradient(160deg, #1a1040 0%, #2d1457 55%, #43186b 100%);
color: var(--text);
min-height: 100vh;
padding: 16px;
user-select: none;
-webkit-user-select: none;
}
h1 {
text-align: center;
font-size: clamp(28px, 6vw, 44px);
margin-bottom: 4px;
background: linear-gradient(90deg, var(--gold), var(--accent), var(--blue));
-webkit-background-clip: text;
background-clip: text;
-webkit-text-fill-color: transparent;
letter-spacing: 1px;
}
.subtitle { text-align: center; color: var(--purple); font-size: 16px; margin-bottom: 20px; font-weight: 600; }
#setup { max-width: 520px; margin: 0 auto; }
.name-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.name-num {
width: 44px; height: 44px; border-radius: 50%;
display: flex; align-items: center; justify-content: center;
font-weight: 800; font-size: 20px; flex-shrink: 0; color: #1a1040;
}
.name-row input {
flex: 1; font-size: 22px; padding: 14px 16px; border-radius: 14px;
border: 2px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.1);
color: var(--text); outline: none; min-width: 0;
}
.name-row input:focus { border-color: var(--gold); background: rgba(255,255,255,0.16); }
.name-row input::placeholder { color: rgba(255,255,255,0.4); }
.avatar-wrap{position:relative;width:44px;height:44px;flex-shrink:0;cursor:pointer;}
.avatar-wrap input[type="file"]{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;z-index:2;}
.avatar-circle{width:44px;height:44px;border-radius:50%;border:2px dashed rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:center;font-size:18px;background:rgba(255,255,255,0.08);overflow:hidden;transition:border-color 0.2s;}
.avatar-circle.has-avatar{border:2.5px solid var(--gold);}
.avatar-circle.has-avatar .avatar-icon{display:none;}
.avatar-circle img.avatar-img{display:none;width:100%;height:100%;object-fit:cover;border-radius:50%;}
.avatar-circle.has-avatar img.avatar-img{display:block;}
.big-btn {
display: block; width: 100%; padding: 20px; font-size: 24px; font-weight: 800;
border: none; border-radius: 18px; cursor: pointer; margin-top: 16px; color: #1a1040;
background: linear-gradient(90deg, var(--gold), #ffb53f);
box-shadow: 0 6px 0 rgba(0,0,0,0.3); transition: transform 0.08s;
}
.big-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
#game { display: none; max-width: 520px; margin: 0 auto; }
.round-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
.round-label {
font-size: 22px; font-weight: 800; color: var(--gold);
background: rgba(255,210,63,0.12); padding: 8px 18px; border-radius: 999px;
border: 2px solid rgba(255,210,63,0.4);
}
.ctrl-btns { display: flex; gap: 8px; }
.ctrl-btn {
padding: 12px 18px; font-size: 17px; font-weight: 700; border: none; border-radius: 12px;
cursor: pointer; color: #fff; box-shadow: 0 4px 0 rgba(0,0,0,0.3); transition: transform 0.08s;
}
.ctrl-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
.ctrl-btn:disabled { opacity: 0.35; cursor: default; }
#undoBtn { background: linear-gradient(90deg, #ff9a3f, #ff5e7e); }
#undoRoundBtn { background: linear-gradient(90deg, #b388ff, #7c4dff); }
#newGameBtn { background: linear-gradient(90deg, #4cc9f0, #00b4d8); }
.players { display: grid; grid-template-columns: 1fr; gap: 12px; }
.player-card {
display: flex; align-items: center; justify-content: space-between;
padding: 18px 20px; border-radius: 18px; background: rgba(255,255,255,0.08);
border: 3px solid transparent; cursor: pointer;
transition: transform 0.08s, border-color 0.2s, background 0.2s;
position: relative; overflow: hidden;
}
.player-card:active { transform: scale(0.97); }
.player-card.leader { border-color: var(--gold); background: rgba(255,210,63,0.14); box-shadow: 0 0 18px rgba(255,210,63,0.35); }
.player-card.scored-this-round { opacity: 0.55; }
.pc-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
.pc-dot { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 24px; color: #1a1040; flex-shrink: 0; overflow: hidden; }
.pc-dot img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; display: block; }
.pc-info { min-width: 0; }
.pc-name { font-size: clamp(20px, 4.5vw, 26px); font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pc-last { font-size: 14px; color: rgba(255,255,255,0.6); font-weight: 600; margin-top: 2px; }
.pc-total { font-size: clamp(30px, 7vw, 42px); font-weight: 900; flex-shrink: 0; }
.leader .pc-total { color: var(--gold); }
.crown { font-size: 22px; margin-left: 6px; }
#overlay { display: none; position: fixed; inset: 0; background: rgba(10,5,30,0.85); z-index: 50; align-items: center; justify-content: center; padding: 16px; }
#overlay.show { display: flex; }
.modal { background: var(--card); border-radius: 24px; padding: 14px; width: 100%; max-width: 420px; border: 3px solid rgba(255,255,255,0.15); box-shadow: 0 20px 60px rgba(0,0,0,0.6); overflow-y: auto; max-height: 98vh; }
.modal-avatar-wrap{text-align:center;margin-bottom:6px;}
.modal-avatar{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2.5px solid var(--gold);}
.modal-title { text-align: center; font-size: 20px; font-weight: 800; margin-bottom: 2px; }
.modal-sub { text-align: center; color: var(--purple); font-weight: 600; margin-bottom: 8px; font-size: 13px; }
.score-display { text-align: center; font-size: 42px; font-weight: 900; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 4px 8px; margin-bottom: 8px; min-height: 62px; color: var(--gold); letter-spacing: 2px; }
.pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
.pad button { font-size: 22px; font-weight: 800; padding: 11px 0; border: none; border-radius: 12px; background: rgba(255,255,255,0.12); color: #fff; cursor: pointer; transition: transform 0.06s, background 0.15s; }
.pad button:active { transform: scale(0.93); background: rgba(255,255,255,0.25); }
.modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 7px; }
.bust-btn, .ok-btn, .cancel-btn { font-size: 17px; font-weight: 800; padding: 10px 0; border: none; border-radius: 12px; cursor: pointer; color: #fff; box-shadow: 0 3px 0 rgba(0,0,0,0.3); transition: transform 0.08s; }
.bust-btn:active, .ok-btn:active, .cancel-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }
.bust-btn { background: linear-gradient(90deg, #ff5e7e, #e63956); grid-column: 1 / -1; }
.ok-btn { background: linear-gradient(90deg, #3ddc84, #1fa860); color: #0b3320; }
.cancel-btn { background: rgba(255,255,255,0.15); }
.modal-scoreboard { margin-top: 9px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.12); }
.modal-scoreboard-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.35); text-align: center; margin-bottom: 5px; }
.sb-row { display: flex; align-items: center; padding: 4px 8px; border-radius: 8px; margin-bottom: 2px; background: rgba(255,255,255,0.04); border: 2px solid transparent; transition: background 0.15s; }
.sb-row.sb-active { background: rgba(255,255,255,0.13); }
.sb-dot { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; margin-right: 9px; overflow: hidden; }
.sb-dot img { width: 18px; height: 18px; border-radius: 50%; object-fit: cover; display: block; }
.sb-name { flex: 1; font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: rgba(255,255,255,0.75); }
.sb-row.sb-active .sb-name { color: #fff; }
.sb-score { font-size: 16px; font-weight: 900; flex-shrink: 0; margin-left: 8px; color: rgba(255,255,255,0.55); }
.sb-row.sb-active .sb-score { color: var(--gold); }
#winBanner { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(10,5,30,0.92); align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 24px; }
#winBanner.show { display: flex; }
.win-trophy { font-size: 90px; animation: bounce 1s infinite alternate ease-in-out; }
@keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-18px); } }
.win-name { font-size: clamp(40px, 10vw, 72px); font-weight: 900; background: linear-gradient(90deg, var(--gold), var(--accent), var(--blue), var(--green)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin: 12px 0 4px; }
.win-msg { font-size: 26px; font-weight: 700; color: var(--gold); margin-bottom: 28px; }
.win-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.win-btns button { font-size: 22px; font-weight: 800; padding: 18px 30px; border: none; border-radius: 16px; cursor: pointer; color: #1a1040; box-shadow: 0 5px 0 rgba(0,0,0,0.35); }
.win-btns .again { background: linear-gradient(90deg, var(--gold), #ffb53f); }
.win-btns .keep { background: rgba(255,255,255,0.85); }
.confetti { position: absolute; top: -20px; font-size: 28px; animation: fall linear forwards; }
@keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0.7; } }
@keyframes barrelRoll {
0% { transform: rotate(0deg) scale(1); }
50% { transform: rotate(360deg) scale(0.82); }
100% { transform: rotate(720deg) scale(1); }
}
html.barrel-roll { animation: barrelRoll 1.4s cubic-bezier(0.4, 0.0, 0.2, 1) forwards; transform-origin: center center; }
.modal-toggle{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.modal-toggle-btn{font-size:15px;font-weight:700;padding:9px 4px;border:none;border-radius:10px;cursor:pointer;color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.08);transition:background 0.15s,color 0.15s;}
.modal-toggle-btn.mtb-active{background:rgba(255,255,255,0.2);color:#fff;}
.lb-row{display:flex;align-items:center;padding:9px 10px;border-radius:12px;margin-bottom:5px;background:rgba(255,255,255,0.06);border:2px solid transparent;}
.lb-row.lb-active{background:rgba(255,255,255,0.13);border-color:rgba(255,255,255,0.18);}
.lb-row.lb-leader .lb-score{color:var(--gold);}
.lb-rank{font-size:12px;font-weight:800;color:rgba(255,255,255,0.35);width:22px;flex-shrink:0;text-align:center;}
.lb-dot{width:34px;height:34px;border-radius:50%;flex-shrink:0;margin:0 10px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#1a1040;}
.lb-dot img{width:34px;height:34px;border-radius:50%;object-fit:cover;display:block;}
.lb-name{flex:1;font-size:15px;font-weight:700;white-space:nowraw;overflow:hidden;text-overflow:ellipsis;}
.lb-score{font-size:20px;font-weight:900;flex-shrink:0;margin-left:8px;}
#clearSaveBtn{background:rgba(255,255,255,0.09);color:rgba(255,255,255,0.4);font-size:13px;padding:10px 12px;}
</style>
</head>
<body>
<h1>FLIP 7</h1>
<div class="subtitle">SCOREKEEPER &middot; FIRST TO 200 WINS</div>
<div id="setup">
<div id="nameRows"></div>
<button class="big-btn" onclick="startGame()">&#9654; START GAME</button>
</div>
<div id="game">
<div class="round-bar">
<div class="round-label">ROUND <span id="roundNum">1</span></div>
<div class="ctrl-btns">
<button class="ctrl-btn" id="undoBtn" onclick="undo()" disabled>&#8617; UNDO</button>
<button class="ctrl-btn" id="undoRoundBtn" onclick="confirmUndoRound()" disabled>&#8635; UNDO ROUND</button>
<button class="ctrl-btn" id="newGameBtn" onclick="confirmNewGame()">&#10022; NEW GAME</button>
<button class="ctrl-btn" id="clearSaveBtn" onclick="confirmClearSave()">&#128190; CLEAR SAVE</button>
</div>
</div>
<div class="players" id="playerList"></div>
</div>
<div id="overlay" onclick="if(event.target===this)closeModal()">
<div class="modal">
<div class="modal-avatar-wrap" id="modalAvatarWrap" style="display:none"><img class="modal-avatar" id="modalAvatarImg" src="" alt=""></div>
<div class="modal-title" id="modalName"></div>
<div class="modal-sub" id="modalSub"></div>
<div class="modal-toggle">
<button class="modal-toggle-btn mtb-active" id="mtbScore" onclick="switchModalView('score')">&#9998; Score</button>
<button class="modal-toggle-btn" id="mtbLb" onclick="switchModalView('lb')">&#128202; Leaderboard</button>
</div>
<div id="scorePanel">
<div class="score-display" id="scoreDisplay">&nbsp;</div>
<div class="pad">
<button onclick="padDigit(1)">1</button><button onclick="padDigit(2)">2</button><button onclick="padDigit(3)">3</button>
<button onclick="padDigit(4)">4</button><button onclick="padDigit(5)">5</button><button onclick="padDigit(6)">6</button>
<button onclick="padDigit(7)">7</button><button onclick="padDigit(8)">8</button><button onclick="padDigit(9)">9</button>
<button onclick="padClear()">C</button><button onclick="padDigit(0)">0</button><button onclick="padBack()">&#9003;</button>
</div>
<button class="bust-btn" style="margin-top:8px;width:100%" onclick="submitScore(0)">&#128165; BUSTED &mdash; 0 POINTS</button>
<div class="modal-actions">
<button class="cancel-btn" onclick="closeModal()">CANCEL</button>
<button class="ok-btn" onclick="submitEntered()">&#10003; OK</button>
</div>
<div class="modal-scoreboard">
<div class="modal-scoreboard-label">SCORES</div>
<div id="modalScoreboard"></div>
</div>
</div>
<div id="lbPanel" style="display:none">
<div id="lbScoreboard"></div>
</div>
</div>
</div>
<div id="winBanner">
<div class="win-trophy">&#127942;</div>
<div class="win-name" id="winName"></div>
<div class="win-msg" id="winMsg"></div>
<div class="win-btns">
<button class="again" onclick="newGame()">&#127881; NEW GAME</button>
<button class="keep" onclick="hideWin()">KEEP SCORING</button>
</div>
</div>
<script>
const COLORS=['#ffd23f','#ff5e7e','#4cc9f0','#3ddc84','#b388ff','#ff9a3f','#f72585','#80ffdb'];
const TARGET=200;
let players=[],history=[],currentPlayer=null,entered='',winShown=false,modalView='score';
const avatars=new Array(8).fill(null);

function setAvatar(i,input){
const file=input.files[0];if(!file)return;
const reader=new FileReader();
reader.onload=function(e){
avatars[i]=e.target.result;
const circle=document.getElementById('avatarCircle'+i);
circle.querySelector('img.avatar-img').src=avatars[i];
circle.classList.add('has-avatar');
};
reader.readAsDataURL(file);
input.value='';
}

const nameRows=document.getElementById('nameRows');
for(let i=0;i<8;i++){
nameRows.insertAdjacentHTML('beforeend',
`<div class="name-row"><div class="name-num" style="background:${COLORS[i]}">${i+1}</div><label class="avatar-wrap" title="Add photo"><div class="avatar-circle" id="avatarCircle${i}"><span class="avatar-icon">&#128247;</span><img class="avatar-img" src="" alt=""></div><input type="file" accept="image/*" onchange="setAvatar(${i},this)"></label><input type="text" maxlength="14" placeholder="Player ${i+1}${i<2?'':' (optional)'}" id="name${i}" autocomplete="off"></div>`);
}

function startGame(){
players=[];
for(let i=0;i<8;i++){const v=document.getElementById('name'+i).value.trim();if(v)players.push({name:v,color:COLORS[i],scores:[],avatar:avatars[i]});}
if(players.length<1){alert('Enter at least one player name!');return;}
history=[];winShown=false;
document.getElementById('setup').style.display='none';
document.getElementById('game').style.display='block';
render();saveState();
}

const total=p=>p.scores.reduce((a,b)=>a+b,0);
const currentRound=()=>Math.min(...players.map(p=>p.scores.length))+1;
const inCurrentRound=p=>p.scores.length>=currentRound();

function render(){
document.getElementById('roundNum').textContent=currentRound();
document.getElementById('undoBtn').disabled=history.length===0;
document.getElementById('undoRoundBtn').disabled=Math.min(...players.map(p=>p.scores.length))===0;
const totals=players.map(total),max=Math.max(...totals);
const list=document.getElementById('playerList');list.innerHTML='';
const sorted=[...players].map((p,i)=>({p,i})).sort((a,b)=>total(b.p)-total(a.p));
sorted.forEach(({p,i})=>{
const t=total(p),isLeader=t===max&&t>0,done=inCurrentRound(p);
const last=p.scores.length?(p.scores[p.scores.length-1]===0?'Last: BUST &#128165;':'Last: +'+p.scores[p.scores.length-1]):'Tap to score';
const dotContent=p.avatar?`<img src="${p.avatar}" alt="">`:p.name[0].toUpperCase();
const dotBg=p.avatar?'transparent':p.color;
list.insertAdjacentHTML('beforeend',
`<div class="player-card ${isLeader?'leader':''} ${done?'scored-this-round':''}" onclick="openModal(${i})">
<div class="pc-left"><div class="pc-dot" style="background:${dotBg}">${dotContent}</div>
<div class="pc-info"><div class="pc-name">${esc(p.name)}${isLeader?'<span class="crown">&#128081;</span>':''}</div>
<div class="pc-last">${last}</div></div></div><div class="pc-total">${t}</div></div>`);
});
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

let _ac=null;
function getAC(){
if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();
if(_ac.state==='suspended')_ac.resume();
return _ac;
}
function playTap(){
try{
const ctx=getAC(),t=ctx.currentTime,o=ctx.createOscillator(),g=ctx.createGain();
o.connect(g);g.connect(ctx.destination);o.type='sine';
o.frequency.setValueAtTime(880,t);o.frequency.exponentialRampToValueAtTime(660,t+0.06);
g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.07);
o.start(t);o.stop(t+0.08);
}catch(e){}
}
function playScore(){
try{
const ctx=getAC(),t=ctx.currentTime;
[[523,0,0.35],[784,0.11,0.35],[1047,0.2,0.45]].forEach(([freq,delay,dur])=>{
const o=ctx.createOscillator(),g=ctx.createGain();
o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=freq;
g.gain.setValueAtTime(0,t+delay);g.gain.linearRampToValueAtTime(0.28,t+delay+0.02);
g.gain.exponentialRampToValueAtTime(0.001,t+delay+dur);
o.start(t+delay);o.stop(t+delay+dur+0.05);
});
}catch(e){}
}
function playBust(){
try{
const ctx=getAC(),t=ctx.currentTime;
const o=ctx.createOscillator(),g=ctx.createGain();
o.connect(g);g.connect(ctx.destination);o.type='sawtooth';
o.frequency.setValueAtTime(320,t);o.frequency.exponentialRampToValueAtTime(90,t+0.55);
g.gain.setValueAtTime(0.28,t);g.gain.setValueAtTime(0.28,t+0.1);g.gain.exponentialRampToValueAtTime(0.001,t+0.6);
o.start(t);o.stop(t+0.65);
const o2=ctx.createOscillator(),g2=ctx.createGain();
o2.connect(g2);g2.connect(ctx.destination);o2.type='sine';
o2.frequency.setValueAtTime(100,t+0.45);o2.frequency.exponentialRampToValueAtTime(50,t+0.65);
g2.gain.setValueAtTime(0.35,t+0.45);g2.gain.exponentialRampToValueAtTime(0.001,t+0.7);
o2.start(t+0.45);o2.stop(t+0.75);
}catch(e){}
}
function playWin(){
try{
const ctx=getAC(),t=ctx.currentTime;
[[523,0],[659,0.13],[784,0.26],[1047,0.39]].forEach(([freq,delay])=>{
const o=ctx.createOscillator(),g=ctx.createGain();
o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=freq;
g.gain.setValueAtTime(0,t+delay);g.gain.linearRampToValueAtTime(0.3,t+delay+0.03);
g.gain.exponentialRampToValueAtTime(0.001,t+delay+0.55);
o.start(t+delay);o.stop(t+delay+0.6);
});
[[2093,0.55],[2637,0.68],[2093,0.78]].forEach(([freq,delay])=>{
const o=ctx.createOscillator(),g=ctx.createGain();
o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=freq;
g.gain.setValueAtTime(0.12,t+delay);g.gain.exponentialRampToValueAtTime(0.001,t+delay+0.2);
o.start(t+delay);o.stop(t+delay+0.25);
});
}catch(e){}
}

function updateModalHeader(i){
const p=players[i];
const wrap=document.getElementById('modalAvatarWrap'),img=document.getElementById('modalAvatarImg');
if(p.avatar){img.src=p.avatar;wrap.style.display='block';}else{wrap.style.display='none';}
document.getElementById('modalName').textContent=p.name;
document.getElementById('modalSub').textContent=`Round ${p.scores.length+1} · Current total: ${total(p)}`;
}
function openModal(i){
currentPlayer=i;entered='';
updateModalHeader(i);
updateDisplay();updateModalScoreboard();
switchModalView('score');
document.getElementById('overlay').classList.add('show');
}
function switchModalView(view){
modalView=view;
document.getElementById('scorePanel').style.display=view==='score'?'':'none';
document.getElementById('lbPanel').style.display=view==='lb'?'':'none';
document.getElementById('mtbScore').classList.toggle('mtb-active',view==='score');
document.getElementById('mtbLb').classList.toggle('mtb-active',view==='lb');
if(view==='lb')updateLbPanel();
}
function updateLbPanel(){
const lb=document.getElementById('lbScoreboard');if(!lb)return;lb.innerHTML='';
const sorted=[...players].map((p,i)=>({p,i})).sort((a,b)=>total(b.p)-total(a.p));
const max=Math.max(...players.map(total));
sorted.forEach(({p,i},rank)=>{
const t=total(p),isLeader=t===max&&t>0,isActive=i===currentPlayer;
const row=document.createElement('div');
row.className='lb-row'+(isActive?' lb-active':'')+(isLeader?' lb-leader':'');
if(isActive)row.style.borderColor=p.color;
const dotContent=p.avatar?`<img src="${p.avatar}" alt="">`:p.name[0].toUpperCase();
const dotBg=p.avatar?'transparent':p.color;
row.innerHTML=`<div class="lb-rank">${rank+1}</div><div class="lb-dot" style="background:${dotBg}">${dotContent}</div><div class="lb-name">${esc(p.name)}</div><div class="lb-score">${t}</div>`;
lb.appendChild(row);
});
}
function updateModalScoreboard(){
const sb=document.getElementById('modalScoreboard');if(!sb)return;sb.innerHTML='';
const sorted=[...players].map((p,i)=>({p,i})).sort((a,b)=>total(b.p)-total(a.p));
sorted.forEach(({p,i})=>{
const isActive=i===currentPlayer,row=document.createElement('div');
row.className='sb-row'+(isActive?' sb-active':'');
if(isActive)row.style.borderColor=p.color;
const sbDotContent=p.avatar?`<img src="${p.avatar}" alt="">`:'';
const sbDotBg=p.avatar?'transparent':p.color;
row.innerHTML=`<div class="sb-dot" style="background:${sbDotBg}">${sbDotContent}</div><div class="sb-name">${esc(p.name)}</div><div class="sb-score">${total(p)}</div>`;
sb.appendChild(row);
});
}
function closeModal(){document.getElementById('overlay').classList.remove('show');currentPlayer=null;}
function padDigit(d){if(entered.length<3){entered+=d;updateDisplay();playTap();}}
function padBack(){entered=entered.slice(0,-1);updateDisplay();playTap();}
function padClear(){entered='';updateDisplay();playTap();}
function updateDisplay(){document.getElementById('scoreDisplay').innerHTML=entered===''?'&nbsp;':entered;}
function submitEntered(){if(entered===''){closeModal();return;}submitScore(parseInt(entered,10));}
function submitScore(val){
if(currentPlayer===null)return;
if(val===0)playBust();else playScore();
const scoredIdx=currentPlayer;
players[scoredIdx].scores.push(val);history.push(scoredIdx);
render();checkWin();saveState();
if(winShown){closeModal();return;}
const nextIdx=findNextPlayer(scoredIdx);if(nextIdx!==null){
currentPlayer=nextIdx;entered='';
updateModalHeader(nextIdx);
updateDisplay();updateModalScoreboard();
}else{closeModal();}
}
function findNextPlayer(fromIdx){
const n=players.length;
for(let offset=1;offset<n;offset++){const idx=(fromIdx+offset)%n;if(!inCurrentRound(players[idx]))return idx;}
return null;
}
function undo(){
if(!history.length)return;
const i=history.pop();players[i].scores.pop();winShown=false;hideWin();render();saveState();
}
function confirmUndoRound(){
const r=Math.min(...players.map(p=>p.scores.length));
if(r===0)return;
if(confirm('Undo Round '+r+'? This will remove everyone’s scores from that round so it can be re-entered.'))undoLastRound();
}
function undoLastRound(){
const r=Math.min(...players.map(p=>p.scores.length));
if(r===0)return;
players.forEach(p=>{p.scores=p.scores.slice(0,r-1);});
history=[];winShown=false;hideWin();render();saveState();
}
function checkWin(){
if(winShown)return;
let best=null;
players.forEach(p=>{const t=total(p);if(t>=TARGET&&(!best||t>total(best)))best=p;});
if(best){
winShown=true;playWin();
document.documentElement.classList.add('barrel-roll');h
setTimeout(()=>document.documentElement.classList.remove('barrel-roll'),1500);
document.getElementById('winName').textContent=best.name+' WINS!';
document.getElementById('winMsg').textContent=total(best)+' points 🔥';
document.getElementById('winBanner').classList.add('show');
confetti();
}
}
function hideWin(){document.getElementById('winBanner').classList.remove('show');}
function confetti(){
const banner=document.getElementById('winBanner');
const emojis=['🎉','✨','🎊','⭐','📛','🃏'];
for(let i=0;i<40;i++){
const s=document.createElement('div');s.className='confetti';
s.textContent=emojis[Math.floor(Math.random()*emojis.length)];
s.style.left=Math.random()*100+'vw';
s.style.animationDuration=2+Math.random()*3+'s';
s.style.animationDelay=Math.random()*1.5+'s';
banner.appendChild(s);setTimeout(()=>s.remove(),6000);
}
}
function confirmNewGame(){if(history.length===0||confirm('Start a new game? Current scores will be lost.'))newGame();}
function newGame(){clearSave();hideWin();document.getElementById('game').style.display='none';document.getElementById('setup').style.display='block';}
const SAVE_KEY='flip7_save';
function saveState(){
if(!players.length)return;
try{localStorage.setItem(SAVE_KEY,JSON.stringify({players:players.map(p=>({name:p.name,color:p.color,scores:[...p.scores],avatar:p.avatar})),history:[...history],winShown}));}catch(e){}
}
function clearSave(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}}
function confirmClearSave(){if(confirm('Clear saved game and return to setup?'))newGame();}
function loadState(){
try{
const raw=localStorage.getItem(SAVE_KEY);if(!raw)return;
const s=JSON.parse(raw);if(!s.players||!s.players.length)return;
players=s.players;history=s.history||[];winShown=s.winShown||false;
document.getElementById('setup').style.display='none';
document.getElementById('game').style.display='block';
render();
}catch(e){}
}
loadState();
</script>
</body>
</html>
